on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # O la versión que estés usando

    - name: Install dependencies (Backend)
      run: |
        cd backend
        npm install

    - name: Run Tests (Backend)
      run: |
        cd backend
        npm test